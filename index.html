      /* Prevent layout shifts during font loading */
      * {

        min-height: 24px;
      }
      
      /* Prevent button shifts */

        min-height: 36px;
      }
      
      /* Prevent Typography shifts */

      /* Prevent Card shifts */
      .MuiCard-root {
        min-height: 100px;
      }
      
      /* Prevent chip layout shifts */

      }
